<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SOMA - Triage Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:650px; margin:auto; background:white; padding:20px; border-radius:10px; }
.hidden { display:none; }
button { margin-top:15px; padding:12px; width:100%; }
input, select { width:100%; padding:10px; margin-top:10px; }
h2 { margin-top:20px; }
</style>
</head>

<body>
<div class="container">

<h1>SOMA</h1>
<p>Optimización personalizada</p>

<!-- STEP 1 -->
<div id="step1">
<h2>¿Dónde querés realizar tu tratamiento?</h2>
<button onclick="setMode('clinic')">En clínica</button>
<button onclick="setMode('home')">AT HOME</button>
</div>

<!-- STEP 2 HOME -->
<div id="step2_home" class="hidden">
<h2>Modalidad AT HOME</h2>
<button onclick="setHome('individual')">Individual</button>
<button onclick="setHome('group')">Grupal</button>
</div>

<!-- STEP OBJETIVO -->
<div id="step_goal" class="hidden">
<h2>¿Qué querés mejorar?</h2>
<select id="goal">
<option value="">Seleccionar</option>
<option value="energia">Energía</option>
<option value="estres">Estrés</option>
<option value="recovery">Recuperación</option>
<option value="longevidad">Longevidad</option>
</select>

<button onclick="nextBasic()">Continuar</button>
</div>

<!-- STEP CLINICO -->
<div id="step_basic" class="hidden">

<h2>Información clínica</h2>

<label>¿Es tu primera vez en SOMA?</label>
<select id="first_time">
<option value="">Seleccionar</option>
<option value="yes">Sí</option>
<option value="no">No</option>
</select>

<label>Edad</label>
<input type="number" id="age">

<label>Enfermedades</label>
<select id="disease">
<option value="">Seleccionar</option>
<option value="no">No</option>
<option value="yes">Sí</option>
</select>

<label>Alergias medicamentosas</label>
<select id="allergies">
<option value="">Seleccionar</option>
<option value="no">No</option>
<option value="yes">Sí</option>
</select>

<label>Embarazo / lactancia</label>
<select id="pregnancy">
<option value="">Seleccionar</option>
<option value="no">No</option>
<option value="yes">Sí</option>
</select>

<button onclick="evaluateIndividual()">Evaluar</button>
</div>

<!-- STEP GROUP DETALLADO -->
<div id="step_group" class="hidden">

<h2>Coordinación grupal</h2>

<label>Cantidad de personas</label>
<input type="number" id="group_size">

<label>Ubicación</label>
<input type="text" id="location">

<label>Fecha deseada</label>
<input type="date" id="date">

<label>¿Todos son mayores de 18?</label>
<select id="adults">
<option value="">Seleccionar</option>
<option value="yes">Sí</option>
<option value="no">No</option>
</select>

<label>¿Alguno presenta patologías relevantes?</label>
<select id="group_risk">
<option value="">Seleccionar</option>
<option value="no">No</option>
<option value="yes">Sí</option>
</select>

<p>Cada participante completará su triage individual antes de la confirmación.</p>

<button onclick="evaluateGroup()">Continuar</button>

</div>

<!-- RESULT -->
<div id="result" class="hidden">
<h2>Resultado</h2>
<p id="result_text"></p>
</div>

</div>

<script>

let mode = "";
let home = "";

function setMode(m){
mode = m;
hide("step1");

if(m === "home") show("step2_home");
else show("step_goal");
}

function setHome(h){
home = h;
hide("step2_home");

if(h === "group") show("step_group");
else show("step_goal");
}

function nextBasic(){
hide("step_goal");
show("step_basic");
}

function evaluateIndividual(){

let first = val("first_time");
let disease = val("disease");
let allergies = val("allergies");
let pregnancy = val("pregnancy");
let goal = val("goal");

hide("step_basic");
show("result");

// RIESGO
if(disease === "yes" || allergies === "yes" || pregnancy === "yes"){
result(`
Se requiere evaluación médica previa.<br><br>
El equipo clínico revisará tu caso antes de definir el tratamiento.
`);
return;
}

// TELECONSULTA SOLO SI:
if(first === "yes" && (mode === "home")){
result(`
Primera vez en modalidad AT HOME.<br><br>
Se requiere una teleconsulta médica previa obligatoria.
`);
return;
}

// PASA A PROTOCOLO
result(`
Apto para protocolo de ${goal}.<br><br>

✔ Validación médica asincrónica previa a confirmación.<br>
✔ Verificación clínica breve antes del procedimiento.<br><br>

El equipo médico evaluará tu caso y confirmará el tratamiento.
`);
}

function evaluateGroup(){

let risk = val("group_risk");

hide("step_group");
show("result");

if(risk === "yes"){
result(`
El grupo requiere validación médica previa.<br><br>
Nuestro equipo evaluará cada caso individual antes de confirmar.
`);
return;
}

result(`
Solicitud grupal iniciada.<br><br>

✔ Cada participante deberá completar triage individual.<br>
✔ Validación médica asincrónica obligatoria.<br>
✔ Confirmación final sujeta a revisión clínica.<br><br>

Nos contactaremos para coordinar logística y aprobación médica.
`);
}

function val(id){
return document.getElementById(id).value;
}

function show(id){
document.getElementById(id).classList.remove("hidden");
}

function hide(id){
document.getElementById(id).classList.add("hidden");
}

function result(text){
document.getElementById("result_text").innerHTML = text;
}

</script>

</body>
</html>
