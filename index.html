<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SOMA - Triaje</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5ef;
    --surface: #fffdf8;
    --surface-2: #f2ede4;
    --border: #ddd6c8;
    --border-strong: #bdb3a2;
    --text: #1f1a17;
    --muted: #736b61;
    --soft: #a79c8e;
    --accent: #0f5b47;
    --accent-2: #1643a3;
    --good-bg: #e9f7ef;
    --good-tx: #0f6b41;
    --warn-bg: #fff4e6;
    --warn-tx: #8a5300;
    --danger-bg: #fdecec;
    --danger-tx: #9b1c1c;
    --radius: 14px;
  }

  html, body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(15, 91, 71, 0.08), transparent 30%),
      radial-gradient(circle at top right, rgba(22, 67, 163, 0.07), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.18) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: 0.25;
  }

  .wrap {
    position: relative;
    max-width: 520px;
    margin: 0 auto;
    padding: 28px 18px 64px;
  }

  .brand {
    text-align: center;
    letter-spacing: 0.34em;
    font-size: 11px;
    color: var(--soft);
    margin-bottom: 18px;
    font-weight: 700;
  }

  .progress {
    height: 2px;
    background: rgba(31, 26, 23, 0.12);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width 0.35s ease;
  }

  .step {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--soft);
    min-height: 14px;
    margin-bottom: 24px;
  }

  .title {
    font-size: 28px;
    line-height: 1.08;
    margin-bottom: 10px;
    letter-spacing: -0.03em;
  }

  .sub {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 22px;
  }

  .panel {
    background: rgba(255, 253, 248, 0.88);
    border: 1px solid rgba(221, 214, 200, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 22px;
    box-shadow: 0 18px 55px rgba(56, 42, 22, 0.08);
    overflow: hidden;
  }

  .inner {
    padding: 18px;
  }

  .grid {
    display: grid;
    gap: 10px;
  }

  .grid-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .card {
    border: 1.5px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active, .pill:active, .toggle:active, .back:active, .cta:active {
    transform: translateY(1px);
  }

  .card.sel, .pill.sel, .toggle.sel {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(15, 91, 71, 0.12);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .emoji {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    background: var(--surface-2);
    font-size: 18px;
    flex-shrink: 0;
  }

  .card-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .card-sub {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .pill-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    padding: 11px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .section {
    margin-bottom: 18px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--soft);
    margin-bottom: 10px;
  }

  .q {
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .help {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .field {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 15px;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  .field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(15, 91, 71, 0.08);
  }

  .field-row {
    display: grid;
    gap: 10px;
    margin-bottom: 10px;
  }

  .toggle-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .toggle {
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 12px;
    cursor: pointer;
    text-align: center;
    font-weight: 700;
    color: var(--text);
  }

  .toggle .small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
  }

  .stack {
    display: grid;
    gap: 8px;
  }

  .check {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 15px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
  }

  .check input {
    margin-top: 4px;
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .check span {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 18px 0;
  }

  .notice {
    border-radius: 16px;
    padding: 14px 15px;
    font-size: 13px;
    line-height: 1.55;
    margin-bottom: 12px;
  }

  .notice.good { background: var(--good-bg); color: var(--good-tx); }
  .notice.warn { background: var(--warn-bg); color: var(--warn-tx); }
  .notice.danger { background: var(--danger-bg); color: var(--danger-tx); }

  .summary {
    border: 1px solid var(--border);
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(242,237,228,0.9));
    padding: 18px;
  }

  .summary h3 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .summary p {
    color: var(--muted);
    line-height: 1.55;
    font-size: 14px;
  }

  .meta {
    display: grid;
    gap: 8px;
    margin-top: 14px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(221, 214, 200, 0.7);
  }

  .meta-row:last-child { border-bottom: 0; }
  .meta-k { color: var(--muted); font-size: 12px; }
  .meta-v { color: var(--text); font-size: 13px; font-weight: 600; text-align: right; }

  .cta {
    width: 100%;
    border: 0;
    border-radius: 16px;
    padding: 15px 16px;
    font: inherit;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .cta:disabled {
    cursor: default;
    opacity: 0.35;
  }

  .back {
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 6px 0 12px;
    font: inherit;
    font-size: 14px;
    cursor: pointer;
  }

  .micro {
    color: var(--soft);
    font-size: 12px;
    line-height: 1.55;
    text-align: center;
    margin-top: 12px;
  }

  .hidden { display: none !important; }

  @media (max-width: 420px) {
    .grid-2 { grid-template-columns: 1fr; }
    .toggle-row { grid-template-columns: 1fr; }
    .title { font-size: 25px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">S O M A</div>
  <div class="progress"><div id="bar"></div></div>
  <div class="step" id="stepLabel">&nbsp;</div>
  <div id="app"></div>
</div>

<script>
const TREATMENTS = [
  { id: "foundation", label: "FOUNDATION", desc: "Hidratacion base, vitaminas y soporte general" },
  { id: "recovery", label: "RECOVERY", desc: "Recuperacion fisica, energia y desgaste muscular" },
  { id: "skin-glow", label: "SKIN GLOW", desc: "Luminosidad, piel y antioxidantes" },
  { id: "neuro-flow", label: "NEURO-FLOW", desc: "Claridad mental, foco y rendimiento cognitivo" },
  { id: "neuro-calm", label: "NEURO-CALM", desc: "Bajar activacion, tension y estres" },
  { id: "eternal", label: "ETERNAL", desc: "Longevidad, soporte celular y optimizacion" }
];

const FLOW_MAP = {
  foundation: "soma_guided",
  recovery: "soma_guided",
  "skin-glow": "soma_guided",
  "neuro-flow": "soma_guided",
  "neuro-calm": "soma_guided",
  eternal: "soma_guided"
};

const TX_FORM = {
  foundation: [
    { id: "goal", q: "Que te hizo elegir FOUNDATION?", opts: ["Me siento deshidratado", "Quiero un base general", "Quiero sumar vitaminas"] },
    { id: "context", q: "Como te sentis hoy?", opts: ["Cansado", "Estable", "Muy bien"] }
  ],
  recovery: [
    { id: "goal", q: "Que te interesa recuperar?", opts: ["Entrenamiento", "Fatiga", "Musculos cargados"] },
    { id: "timing", q: "Cuanto hace que te venis sintiendo asi?", opts: ["24 hs", "Varios dias", "Mas de una semana"] }
  ],
  "skin-glow": [
    { id: "goal", q: "Que queres priorizar?", opts: ["Luminosidad", "Hidratacion", "Antioxidantes"] },
    { id: "timing", q: "Tenes un evento o fecha especial?", opts: ["Si", "No", "Estoy evaluando"] }
  ],
  "neuro-flow": [
    { id: "goal", q: "Que te pesa mas hoy?", opts: ["Foco", "Memoria", "Energía mental"] },
    { id: "timing", q: "En que momento lo notas mas?", opts: ["Mañana", "Tarde", "Todo el dia"] }
  ],
  "neuro-calm": [
    { id: "goal", q: "Que queres bajar mas?", opts: ["Ansiedad", "Tension", "Activacion"] },
    { id: "timing", q: "Como viene tu descanso?", opts: ["Bueno", "Irregular", "Malo"] }
  ],
  eternal: [
    { id: "goal", q: "Que buscas principalmente?", opts: ["Prevencion", "Longevidad", "Recuperacion celular"] },
    { id: "timing", q: "Ya probaste algo similar?", opts: ["Si", "No", "No estoy seguro"] }
  ]
};

const INTENTIONS = [
  { id: "energy", label: "Energia y fatiga", desc: "Cansancio, bajo rendimiento y agotamiento" },
  { id: "stress", label: "Estres y claridad mental", desc: "Foco, tension y sobrecarga mental" },
  { id: "recovery", label: "Recuperacion fisica", desc: "Dolor, desgaste y vuelta al entrenamiento" },
  { id: "aesthetics", label: "Piel y estetica", desc: "Brillo, hidratacion y antioxidantes" },
  { id: "longevity", label: "Salud a largo plazo", desc: "Prevencion y optimizacion" },
  { id: "unknown", label: "No estoy seguro", desc: "Te guiamos para encontrar la mejor opcion" }
];

const RECS = {
  energy: { primary: "RECOVERY", alt: "FOUNDATION", adv: "ETERNAL" },
  stress: { primary: "NEURO-CALM", alt: "NEURO-FLOW", adv: "FOUNDATION" },
  recovery: { primary: "RECOVERY", alt: "FOUNDATION", adv: "ETERNAL" },
  aesthetics: { primary: "SKIN GLOW", alt: "FOUNDATION", adv: null },
  longevity: { primary: "ETERNAL", alt: "NEURO-FLOW", adv: "FOUNDATION" },
  unknown: { primary: "FOUNDATION", alt: "RECOVERY", adv: null }
};

const TX_DATA = {
  FOUNDATION: { desc: "Hidratacion base + vitaminas esenciales + electrolitos", sessions: "2 sesiones", freq: "Quincenal" },
  RECOVERY: { desc: "Aminoacidos + Zinc + Complejo B + Magnesio", sessions: "4 sesiones", freq: "Segun evolucion" },
  "SKIN GLOW": { desc: "Vitamina C + Glutathione + Biotina + Silicio", sessions: "6 sesiones", freq: "Semanal" },
  "NEURO-FLOW": { desc: "Alpha-GPC + Taurina + B12 + L-Tirosina", sessions: "3 sesiones", freq: "Semanal" },
  "NEURO-CALM": { desc: "Magnesio + GABA + B6 + L-Teanina", sessions: "3 sesiones", freq: "Semanal" },
  ETERNAL: { desc: "NAD+ + Resveratrol + Glutathione + Antioxidantes", sessions: "4 sesiones", freq: "Mensual" }
};

const S = {
  step: "branch",
  branch: null,
  homeType: null,
  entryMode: null,
  recommendation: null,
  recommendationChosen: null,
  selectedTx: null,
  guided: { intention: null, depth: {}, security: { conditions: null, medication: null, pregnancy: null, allergies: null }, firstTime: null },
  txAnswers: {},
  home: { firstTime: null, space: null, medicalHistory: null },
  group: { organizer: "", contact: "", size: "", adults: null, eventType: "", address: "", linkSent: false, focus: null, depth: {} },
  consent: { informed: false, contact: false, medicalReview: false, privacy: false }
};

function go(step) {
  S.step = step;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function backLabel() { return "Volver"; }

function backButton() {
  return '<button class="back" id="backBtn">← ' + backLabel() + "</button>";
}

function renderCards(items, selected, dataAttr) {
  return items.map(item => {
    const active = selected === item.id ? " sel" : "";
    return '<button class="card' + active + '" data-' + dataAttr + '="' + item.id + '">' +
      '<div class="card-top">' +
      '<div class="emoji">✦</div>' +
      '<div>' +
      '<div class="card-title">' + item.label + "</div>" +
      '<div class="card-sub">' + item.desc + "</div>" +
      "</div>" +
      "</div>" +
      "</button>";
  }).join("");
}

function consentBlock() {
  return '<div class="section">' +
    '<div class="section-label">Consentimiento</div>' +
    '<div class="stack">' +
    checkbox("informed", "Entiendo que la informacion brindada sirve como consentimiento informado y sera usada para evaluar mi solicitud.") +
    checkbox("contact", "Autorizo que un medico del equipo pueda contactarme para un analisis mas profundo o una indicacion adicional.") +
    checkbox("medicalReview", "Acepto que un medico revise mi caso si el equipo lo considera necesario.") +
    checkbox("privacy", "Acepto que mis datos sean tratados de forma confidencial y solo para fines asistenciales.") +
    '</div></div>';
}

function checkbox(id, text) {
  const checked = S.consent[id] ? " checked" : "";
  return '<label class="check"><input type="checkbox" data-consent="' + id + '"' + checked + '><span>' + text + "</span></label>";
}

function canContinueConsent() {
  return Object.values(S.consent).every(Boolean);
}

function groupFieldsReady() {
  return !!(S.group.organizer && S.group.contact && S.group.size && S.group.eventType && S.group.address && S.group.adults !== null);
}

function refreshGroupNextState() {
  const btn = document.getElementById("groupNext");
  if (btn) btn.disabled = !groupFieldsReady();
}

function updateProgress() {
  const labels = {
    branch: "",
    homeType: "Tipo",
    mode: "Modo",
    direct: "Suero",
    guided: "Intencion",
    tx: "Suero",
    depth: "Contexto",
    recommendation: "Recomendacion",
    security: "Seguridad",
    before_visit: "Casa",
    consent: "Consentimiento",
    soma_confirm: "",
    home_confirm: "",
    group_recommendation: "",
    group: "Grupo",
    final: ""
  };
  const order = {
    branch: 0,
    homeType: 1,
    mode: 2,
    direct: 3,
    guided: 3,
    tx: 4,
    depth: 4,
    recommendation: 5,
    security: 5,
    before_visit: 6,
    consent: 7,
    soma_confirm: 8,
    home_confirm: 8,
    group_recommendation: 8,
    group: 7,
    final: 9
  };
  const pct = Math.min(100, Math.round(((order[S.step] ?? 0) / 9) * 100));
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("stepLabel").textContent = labels[S.step] || "";
}

function resetGuided() {
  S.recommendation = null;
  S.recommendationChosen = null;
  S.guided.intention = null;
  S.guided.depth = {};
  S.guided.security = { conditions: null, medication: null, pregnancy: null, allergies: null };
}

function resetHomeIndividual() {
  S.home.firstTime = null;
  S.home.space = null;
  S.home.medicalHistory = null;
}

function resetHomeGroup() {
  S.group.organizer = "";
  S.group.contact = "";
  S.group.size = "";
  S.group.adults = null;
  S.group.eventType = "";
  S.group.address = "";
  S.group.linkSent = false;
  S.group.focus = null;
  S.group.depth = {};
}

function renderBranch() {
  return '<div class="panel"><div class="inner">' +
    '<div class="title">Vamos a ordenar tu triage</div>' +
    '<div class="sub">Primero elegi si queres atenderte en SOMA o coordinar en tu casa. Luego seguimos con el flujo correcto.</div>' +
    '<div class="grid grid-2">' +
    '<button class="card' + (S.branch === "soma" ? " sel" : "") + '" data-branch="soma"><div class="card-top"><div class="emoji">⌂</div><div><div class="card-title">EN SOMA</div><div class="card-sub">Atencion presencial en la sede.</div></div></div></button>' +
    '<button class="card' + (S.branch === "home" ? " sel" : "") + '" data-branch="home"><div class="card-top"><div class="emoji">⌂</div><div><div class="card-title">AT HOME</div><div class="card-sub">Coordinacion a domicilio o grupal.</div></div></div></button>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<button class="cta" id="branchNext" ' + (S.branch ? "" : "disabled") + '>Continuar</button>' +
    '</div></div>';
}

function renderHomeType() {
  return '<div class="panel"><div class="inner">' +
    backButton() +
    '<div class="title">AT HOME</div>' +
    '<div class="sub">Definimos si la solicitud es individual o grupal para mostrarte el circuito correcto.</div>' +
    '<div class="toggle-row">' +
    '<button class="toggle' + (S.homeType === "individual" ? " sel" : "") + '" data-home-type="individual">Individual<span class="small">Triage habitual + validacion de domicilio.</span></button>' +
    '<button class="toggle' + (S.homeType === "group" ? " sel" : "") + '" data-home-type="group">Grupal<span class="small">Organizador, grupo y link para participantes.</span></button>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<button class="cta" id="homeTypeNext" ' + (S.homeType ? "" : "disabled") + '>Continuar</button>' +
    '</div></div>';
}

function renderMode() {
  const title = S.branch === "home" ? "AT HOME" : "EN SOMA";
  const sub = S.branch === "home"
    ? "Para at home necesitamos definir si es una visita individual o grupal."
    : "En SOMA podes dejar que el triage te guie o elegir directamente el suero.";
  return '<div class="panel"><div class="inner">' +
    backButton() +
    '<div class="title">' + title + "</div>" +
    '<div class="sub">' + sub + "</div>" +
    '<div class="toggle-row">' +
    '<button class="toggle' + (S.entryMode === "guided" ? " sel" : "") + '" data-mode="guided">Quiero que me orienten<span class="small">Seguimos con el algoritmo de triage.</span></button>' +
    '<button class="toggle' + (S.entryMode === "direct" ? " sel" : "") + '" data-mode="direct">Ya se lo que quiero<span class="small">Elijo el suero y voy al cuestionario especifico.</span></button>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<button class="cta" id="modeNext" ' + (S.entryMode ? "" : "disabled") + '>Continuar</button>' +
    '</div></div>';
}

function renderDirect() {
  return '<div class="panel"><div class="inner">' +
    backButton() +
    '<div class="title">Elegi tu suero</div>' +
    '<div class="sub">Las opciones aparecen en pills para que la seleccion sea rapida y clara.</div>' +
    '<div class="pill-wrap">' +
    TREATMENTS.map(tx => '<button class="pill' + (S.selectedTx === tx.id ? " sel" : "") + '" data-tx="' + tx.id + '">' + tx.label + "</button>").join("") +
    "</div>" +
    '<div class="divider"></div>' +
    '<button class="cta" id="txNext" ' + (S.selectedTx ? "" : "disabled") + '>Continuar</button>' +
    '</div></div>';
}

function renderTxQuestions() {
  const tx = S.selectedTx;
  const questions = TX_FORM[tx] || [];
  const label = TREATMENTS.find(t => t.id === tx)?.label || "tu suero";
  const filled = questions.every(q => S.txAnswers[q.id]);
  return '<div class="panel"><div class="inner">' +
    backButton() +
    '<div class="title">Cuestionario de ' + label + "</div>" +
    '<div class="sub">Este bloque ajusta la evaluacion al suero que elegiste desde el inicio.</div>' +
    questions.map(q => {
      return '<div class="section"><div class="q">' + q.q + '</div><div class="pill-wrap">' +
        q.opts.map(opt => '<button class="pill' + (S.txAnswers[q.id] === opt ? " sel" : "") + '" data-txq="' + q.id + '" data-value="' + opt.replace(/"/g, "&quot;") + '">' + opt + "</button>").join("") +

function escapeHtml(str) {
  return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function render() {
  let html = "";
  if (S.step === "branch") html = renderBranch();
  else if (S.step === "homeType") html = renderHomeType();
  else if (S.step === "mode") html = renderMode();
  else if (S.step === "direct") html = renderDirect();
  else if (S.step === "tx") html = renderTxQuestions();
  else if (S.step === "guided") html = renderGuided();
  else if (S.step === "depth") html = renderDepth();
  else if (S.step === "recommendation") html = renderRecommendation();
  else if (S.step === "security") html = renderSecurity();
  else if (S.step === "before_visit") html = renderBeforeVisit();
  else if (S.step === "consent") html = renderConsentStep();
  else if (S.step === "soma_confirm") html = renderSomaConfirmation();
  else if (S.step === "home_confirm") html = renderHomeConfirmation();
  else if (S.step === "group_select") html = renderGroupSelect();
  else if (S.step === "group_recommendation") html = renderGroupRecommendation();
  else if (S.step === "group") html = renderGroup();
  else if (S.step === "final") html = renderFinal();
  document.getElementById("app").innerHTML = html;
  updateProgress();
  bind();
}

function bind() {
  const $ = id => document.getElementById(id);
  const $$ = sel => document.querySelectorAll(sel);

  $$("[data-branch]").forEach(el => el.addEventListener("click", () => {
    S.branch = el.dataset.branch;
    if (S.branch !== "home") S.homeType = null;
    $$("[data-branch]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("branchNext").disabled = false;
  }));

  $("branchNext")?.addEventListener("click", () => {
    if (S.branch === "home") go("homeType");
    else go("mode");
  });

  $$("[data-home-type]").forEach(el => el.addEventListener("click", () => {
    S.homeType = el.dataset.homeType;
    if (S.homeType === "group") resetHomeGroup();
    if (S.homeType === "individual") resetHomeIndividual();
    $$("[data-home-type]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("homeTypeNext").disabled = false;
  }));

  $("homeTypeNext")?.addEventListener("click", () => {
    if (S.homeType === "group") go("group");
    else go("mode");
  });

  $$("[data-mode]").forEach(el => el.addEventListener("click", () => {
    S.entryMode = el.dataset.mode;
    resetGuided();
    $$("[data-mode]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("modeNext").disabled = false;
  }));

  $("modeNext")?.addEventListener("click", () => {
    if (S.entryMode === "direct") go("direct");
    else go("guided");
  });

  $$("[data-tx]").forEach(el => el.addEventListener("click", () => {
    S.selectedTx = el.dataset.tx;
    $$("[data-tx]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("txNext").disabled = false;
  }));

  $("txNext")?.addEventListener("click", () => go("tx"));

  $$("[data-txq]").forEach(el => el.addEventListener("click", () => {
    const id = el.dataset.txq;
    S.txAnswers[id] = el.dataset.value;
    $$('[data-txq="' + id + '"]').forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("txQNext").disabled = !((TX_FORM[S.selectedTx] || []).every(q => S.txAnswers[q.id]));
  }));

  $("txQNext")?.addEventListener("click", () => go("security"));

  $$("[data-int]").forEach(el => el.addEventListener("click", () => {
    S.guided.intention = el.dataset.int;
    $$("[data-int]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("guidedNext").disabled = false;
  }));

  $("guidedNext")?.addEventListener("click", () => go("depth"));

  $$("[data-dq]").forEach(el => el.addEventListener("click", () => {
    const id = el.dataset.dq;
    S.guided.depth[id] = el.dataset.value;
    $$('[data-dq="' + id + '"]').forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    const qSet = (S.guided.intention === "energy" ? 2 : S.guided.intention === "stress" ? 2 : S.guided.intention === "recovery" ? 2 : S.guided.intention === "aesthetics" ? 1 : S.guided.intention === "longevity" ? 2 : 1);
    if ($("depthNext")) $("depthNext").disabled = Object.keys(S.guided.depth).length < qSet;
  }));

  $("depthNext")?.addEventListener("click", () => go("security"));

  $$("[data-rec]").forEach(el => el.addEventListener("click", () => {
    S.recommendation = el.dataset.rec;
    S.recommendationChosen = el.dataset.rec;
    $$("[data-rec]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
  }));

  $("recNext")?.addEventListener("click", () => {
    go("consent");
  });

  $$("[data-bool]").forEach(el => el.addEventListener("click", () => {
    const id = el.dataset.bool;
    S.guided.security[id] = el.dataset.val === "true";
    $$('[data-bool="' + id + '"]').forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("secNext").disabled = !Object.values(S.guided.security).every(v => v !== null);
  }));

  $("secNext")?.addEventListener("click", () => {
    if (S.branch === "home" && S.homeType === "individual") go("before_visit");
    else if (S.branch === "home" && S.homeType === "group") go("group");
    else if (S.entryMode === "guided") go("recommendation");
    else go("consent");
  });

  $$("[data-ft]").forEach(el => el.addEventListener("click", () => {
    S.guided.firstTime = el.dataset.ft === "true";
    $$("[data-ft]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("firstNext").disabled = false;
  }));

  $("firstNext")?.addEventListener("click", () => {
    if (S.branch === "home" && S.homeType === "individual" && S.entryMode === "guided") go("recommendation");
    else go("consent");
  });

  $$("[data-home]").forEach(el => el.addEventListener("click", () => {
    const key = el.dataset.home;
    S.home[key] = el.dataset.val === "true";
    $$('[data-home="' + key + '"]').forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    const homeConfirmBtn = $("homeNext");
    const homeVisitBtn = $("homeVisitNext");
    if (homeConfirmBtn) homeConfirmBtn.disabled = !(S.home.firstTime !== null && S.home.space !== null && S.home.medicalHistory !== null);
    if (homeVisitBtn) homeVisitBtn.disabled = !(S.home.firstTime !== null && S.home.space !== null);
  }));

  $("homeVisitNext")?.addEventListener("click", () => {
    if (S.branch === "home" && S.homeType === "individual" && S.entryMode === "guided") go("recommendation");
    else go("consent");
  });

  $$("[data-group]").forEach(el => el.addEventListener("input", () => {
    S.group[el.dataset.group] = el.value;
    refreshGroupNextState();
  }));

  $$("[data-group-tx]").forEach(el => el.addEventListener("click", () => {
    S.group.focus = el.dataset.groupTx;
    $$("[data-group-tx]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    refreshGroupNextState();
  }));

  $$("[data-group-dq]").forEach(el => el.addEventListener("click", () => {
    const id = el.dataset.groupDq;
    S.group.depth[id] = el.dataset.value;
    $$('[data-group-dq="' + id + '"]').forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    refreshGroupNextState();
  }));

  $$("[data-adults]").forEach(el => el.addEventListener("click", () => {
    S.group.adults = el.dataset.adults === "true";
    $$("[data-adults]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    refreshGroupNextState();
  }));

  $$("[data-consent]").forEach(el => el.addEventListener("change", () => {
    S.consent[el.dataset.consent] = el.checked;
    const btn = $("consentNext") || $("groupRecNext") || $("finishBtn");
    if (btn) {
      btn.disabled = !canContinueConsent();
    }
  }));

  $("groupLink")?.addEventListener("click", () => {
    S.group.linkSent = true;
    alert("Link compartible generado. Cada participante deberia completar su triaje basico, nombre y datos de contacto.");
  });

  $("groupNext")?.addEventListener("click", () => {
    if (!groupFieldsReady()) return;
    if (S.branch === "home" && S.homeType === "group") go("group_select");
    else go("home_confirm");
  });
  $$("[data-group-tx]").forEach(el => el.addEventListener("click", () => {
    S.selectedTx = el.dataset.groupTx;
    $$("[data-group-tx]").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel");
    $("groupTxNext").disabled = false;
  }));
  $("groupTxNext")?.addEventListener("click", () => {
    if (S.selectedTx === "orient") go("group_recommendation");
    else go("consent");
  });
  $("finishBtn")?.addEventListener("click", () => go("result"));

  $("consentNext")?.addEventListener("click", () => {
    if (S.branch === "soma") go("soma_confirm");
    else if (S.branch === "home" && S.homeType === "group") go("home_confirm");
    else go("soma_confirm");
  });

  $("somaConfirmNext")?.addEventListener("click", () => go("final"));
  $("homeConfirmNext")?.addEventListener("click", () => go("final"));
  $("groupRecNext")?.addEventListener("click", () => go("consent"));

  $("backBtn")?.addEventListener("click", () => {
    if (S.step === "homeType") go("branch");
    else if (S.step === "mode") go(S.branch === "home" ? "homeType" : "branch");
    else if (S.step === "direct") go("mode");
    else if (S.step === "tx") go("direct");
    else if (S.step === "guided") go("mode");
    else if (S.step === "depth") go("guided");
    else if (S.step === "security") go(S.entryMode === "direct" ? "tx" : "depth");
    else if (S.step === "firsttime") go("security");
    else if (S.step === "before_visit") go("security");
    else if (S.step === "group") go(S.branch === "home" ? "homeType" : "mode");
    else if (S.step === "group_select") go("group");
    else if (S.step === "group_recommendation") go("group");
    else if (S.step === "recommendation") go(S.branch === "home" && S.homeType === "individual" ? "before_visit" : "security");
    else if (S.step === "consent") go(S.branch === "soma" ? "recommendation" : (S.branch === "home" && S.homeType === "group" ? "group_recommendation" : "before_visit"));
    else if (S.step === "soma_confirm") go("consent");
    else if (S.step === "home_confirm") go(S.branch === "home" && S.homeType === "group" && S.entryMode === "guided" && Object.keys(S.group.depth).length >= 2 ? "group_recommendation" : "consent");
    else if (S.step === "result") go("consent");
  });
}

render();
</script>
</body>
</html>
