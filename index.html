<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SOMA Triage</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eef2f5;
  overflow:hidden;
}

.wrapper {
  display:flex;
  width:400%;
  transition:0.4s;
}

.card {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:30px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:white;
  cursor:pointer;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.error {
  color:red;
  font-size:13px;
  display:none;
}
</style>

</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- STEP 1 -->
  <div class="card">
    <div class="box">
      <h2>¿Dónde será la atención?</h2>

      <button onclick="selectLugar('clinica')">En clínica</button>
      <button onclick="selectLugar('domicilio')">A domicilio</button>

      <div class="error" id="error1">Seleccioná una opción</div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <div class="box">
      <h2>¿Hay espacio adecuado?</h2>

      <button onclick="selectEspacio('si')">Sí</button>
      <button onclick="selectEspacio('no')">No</button>

      <div class="error" id="error2">Seleccioná una opción</div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="card">
    <div class="box">
      <h2>Datos del paciente</h2>

      <input type="text" id="nombre" placeholder="Nombre">
      <input type="number" id="edad" placeholder="Edad">

      <div class="error" id="error3">Completá todos los campos</div>

      <button onclick="validarDatos()">Continuar</button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="card">
    <div class="box">
      <h2>Resultado</h2>
      <div id="resultado"></div>
    </div>
  </div>

</div>

<script>

let current = 0;
let data = {};

function next(step){
  current = step;
  document.getElementById("wrapper").style.transform =
    "translateX(-" + (step * 100) + "vw)";
}

/* =========================
   STEP 1
========================= */

function selectLugar(valor){
  data.lugar = valor;

  if(valor === "clinica"){
    next(2); // salta espacio
  } else {
    next(1);
  }
}

/* =========================
   STEP 2
========================= */

function selectEspacio(valor){
  data.espacio = valor;
  next(2);
}

/* =========================
   STEP 3
========================= */

function validarDatos(){
  let nombre = document.getElementById("nombre").value.trim();
  let edad = document.getElementById("edad").value.trim();

  if(!nombre || !edad){
    document.getElementById("error3").style.display = "block";
    return;
  }

  data.nombre = nombre;
  data.edad = edad;

  generarResultado();
  next(3);
}

/* =========================
   RESULTADO
========================= */

function generarResultado(){

  let texto = `
    <p><b>${data.nombre}</b>, ${data.edad} años</p>
    <p>Modalidad: ${data.lugar}</p>
  `;

  if(data.lugar === "domicilio"){
    texto += `<p>Espacio adecuado: ${data.espacio}</p>`;
  }

  texto += `
  <hr>
  <p>
  Tu caso será evaluado por el equipo médico de SOMA.
  En caso de corresponder, podrá resolverse mediante validación asincrónica.
  </p>
  `;

  document.getElementById("resultado").innerHTML = texto;
}

</script>

</body>
</html>
