<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SOMA Triage</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eef2f5;
  overflow:hidden;
}

.wrapper {
  display:flex;
  width:700%;
  transition:0.4s;
}

.card {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:30px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:white;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.error {
  color:red;
  font-size:13px;
  display:none;
}
</style>

</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- STEP 0 -->
  <div class="card">
    <div class="box">
      <h2>¿Cómo querés la atención?</h2>
      <button onclick="setTipo('clinica')">En clínica</button>
      <button onclick="setTipo('individual')">Individual</button>
      <button onclick="setTipo('grupal')">Grupal</button>
    </div>
  </div>

  <!-- STEP 1: CONTEXTO INDIVIDUAL -->
  <div class="card">
    <div class="box">
      <h2>¿Ya sos paciente?</h2>
      <button onclick="setContinuidad(true)">Sí</button>
      <button onclick="setContinuidad(false)">No</button>
    </div>
  </div>

  <!-- STEP 2: MOTIVO -->
  <div class="card">
    <div class="box">
      <h2>Motivo de consulta</h2>

      <select id="motivo">
        <option value="">Seleccionar</option>
        <option>Dolor</option>
        <option>Rehabilitación</option>
        <option>Control</option>
        <option>Otro</option>
      </select>

      <div class="error" id="errorMotivo">Seleccioná una opción</div>

      <button onclick="validarMotivo()">Continuar</button>
    </div>
  </div>

  <!-- STEP 3: INTENSIDAD -->
  <div class="card">
    <div class="box">
      <h2>Intensidad</h2>

      <select id="intensidad">
        <option value="">Seleccionar</option>
        <option>Leve</option>
        <option>Moderado</option>
        <option>Severo</option>
      </select>

      <div class="error" id="errorIntensidad">Seleccioná una opción</div>

      <button onclick="validarIntensidad()">Continuar</button>
    </div>
  </div>

  <!-- STEP 4: TIEMPO -->
  <div class="card">
    <div class="box">
      <h2>Tiempo de evolución</h2>

      <select id="tiempo">
        <option value="">Seleccionar</option>
        <option>Agudo (< 7 días)</option>
        <option>Subagudo</option>
        <option>Crónico</option>
      </select>

      <div class="error" id="errorTiempo">Seleccioná una opción</div>

      <button onclick="validarTiempo()">Continuar</button>
    </div>
  </div>

  <!-- STEP 5: DATOS -->
  <div class="card">
    <div class="box">
      <h2>Datos del paciente</h2>

      <input id="nombre" placeholder="Nombre">
      <input id="edad" type="number" placeholder="Edad">

      <div class="error" id="errorDatos">Completá los campos</div>

      <button onclick="validarDatos()">Finalizar</button>
    </div>
  </div>

  <!-- STEP 6: RESULTADO -->
  <div class="card">
    <div class="box">
      <h2>Resultado</h2>
      <div id="resultado"></div>
    </div>
  </div>

</div>

<script>

let current = 0;
let data = {};

function next(step){
  current = step;
  document.getElementById("wrapper").style.transform =
    "translateX(-" + (step * 100) + "vw)";
}

/* STEP 0 */

function setTipo(tipo){
  data.tipo = tipo;

  if(tipo === "individual"){
    next(1);
  } else if(tipo === "grupal"){
    generarGrupal();
    next(6);
  } else {
    next(2);
  }
}

/* STEP 1 */

function setContinuidad(valor){
  data.continuidad = valor;
  next(2);
}

/* STEP 2 */

function validarMotivo(){
  let val = document.getElementById("motivo").value;
  if(!val){
    document.getElementById("errorMotivo").style.display="block";
    return;
  }
  data.motivo = val;
  next(3);
}

/* STEP 3 */

function validarIntensidad(){
  let val = document.getElementById("intensidad").value;
  if(!val){
    document.getElementById("errorIntensidad").style.display="block";
    return;
  }
  data.intensidad = val;
  next(4);
}

/* STEP 4 */

function validarTiempo(){
  let val = document.getElementById("tiempo").value;
  if(!val){
    document.getElementById("errorTiempo").style.display="block";
    return;
  }
  data.tiempo = val;
  next(5);
}

/* STEP 5 */

function validarDatos(){
  let n = document.getElementById("nombre").value.trim();
  let e = document.getElementById("edad").value.trim();

  if(!n || !e){
    document.getElementById("errorDatos").style.display="block";
    return;
  }

  data.nombre = n;
  data.edad = e;

  generarResultado();
  next(6);
}

/* RESULTADO */

function generarResultado(){

  let nivel = "Bajo";

  if(data.intensidad === "Severo" || data.tiempo === "Agudo (< 7 días)"){
    nivel = "Alto";
  }

  let texto = `
    <p><b>${data.nombre}</b> (${data.edad})</p>
    <p>${data.motivo} - ${data.intensidad}</p>
    <p>Riesgo clínico: <b>${nivel}</b></p>
  `;

  if(data.tipo === "individual" && data.continuidad){
    texto += `<p>Seguimiento directo sin teleconsulta.</p>`;
  } else if(nivel === "Alto"){
    texto += `<p>Se recomienda evaluación médica directa.</p>`;
  } else {
    texto += `<p>Posible resolución asincrónica.</p>`;
  }

  texto += `
  <hr>
  <p style="font-size:12px;color:gray;">
  Este caso será evaluado por el equipo médico de SOMA.
  </p>
  `;

  document.getElementById("resultado").innerHTML = texto;
}

/* GRUPAL */

function generarGrupal(){
  document.getElementById("resultado").innerHTML = `
    <p>Solicitud grupal recibida.</p>
    <p>El equipo evaluará cobertura y modalidad.</p>
  `;
}

</script>

</body>
</html>
